    <style>
      :root {
        --Bg-Primary: #fff;
        --Labels-Primary: rgba(0, 0, 0, 0.9);
        --Labels-Tertiary: rgba(0, 0, 0, 0.45);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --Bg-Primary: #fff;
          --Labels-Primary: rgba(0, 0, 0, 0.9);
          --Labels-Tertiary: rgba(0, 0, 0, 0.45);
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue",
          Helvetica, Arial, sans-serif;
        line-height: 1.5;
        /*min-height: 100vh;*/
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        position: relative;
        overflow-x: hidden;
        background: var(--Bg-Primary);
      }

      /* Background decoration */
      body::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        background: radial-gradient(
            circle at 30% 70%,
            var(--others-km-blue-10) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            var(--fills-f1) 0%,
            transparent 50%
          );
        z-index: -1;
      }
      .back-button {
        color: var(--Bg-Primary);
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        display: flex;
        height: 40px;
        padding: 0 12px;
        justify-content: center;
        align-items: center;
        border-radius: 12px;
        background: var(--Labels-Primary);
        cursor: pointer;
        border: none;
      }
      a {
        color: var(--Bg-Primary);
        text-decoration: none;
      }
      .text {
        color: var(--Labels-Tertiary);
        text-align: center;
        font-size: 16px;
        font-weight: 400;
        line-height: 24px;
        margin-bottom: 32px;
      }
      .warn-img {
        width: 56px;
        height: 56px;
        margin-bottom: 8px;
      }
    </style>
